services:
  db:
    image: mysql:8.0
    container_name: kconecta-app
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${KC_DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${KC_DB_NAME:-kconecta}
      MYSQL_USER: ${KC_DB_USER:-kconecta}
      MYSQL_PASSWORD: ${KC_DB_PASSWORD:-kconecta}
    ports:
      - "${KC_DB_PORT:-3307}:3306"
    volumes:
      - kconecta-app:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${KC_DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: kconecta-app-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${KC_ADMINER_PORT:-8086}:8080"

volumes:
  kconecta-app:
    name: kconecta-app
    external: true
