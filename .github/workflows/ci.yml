name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend and Orchestration Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "ai-orchestration/requirements.txt" ]; then
            python -m pip install -r ai-orchestration/requirements.txt
          fi

      - name: Compile Python sources
        run: |
          if [ -d "ai-orchestration" ]; then
            python -m compileall ai-orchestration
          else
            echo "ai-orchestration directory not found"
            exit 1
          fi

      - name: Upload orchestration logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-orchestration-logs
          path: ai-orchestration/logs
          if-no-files-found: ignore

  mobile:
    name: Mobile Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if mobile app exists)
        run: |
          if [ -f "apps/providers/package.json" ]; then
            cd apps/providers
            npm ci
          else
            echo "apps/providers/package.json not found, skipping npm install."
          fi

      - name: Lint mobile (if scripts exist)
        run: |
          if [ -f "apps/providers/package.json" ]; then
            cd apps/providers
            npm run lint --if-present
          else
            echo "No mobile package yet, skipping lint."
          fi

      - name: Test mobile (if scripts exist)
        run: |
          if [ -f "apps/providers/package.json" ]; then
            cd apps/providers
            npm test --if-present
          else
            echo "No mobile package yet, skipping tests."
          fi
