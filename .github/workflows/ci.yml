name: CI
on: 
  pull_request: 
    branches: 
      - main 
  push: 
    branches: 
      - main 
jobs: 
  backend: 
    runs_on: ubuntu-latest 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v2 
      - name: Set up Python 
        uses: actions/setup-python@v2 
        with: 
          python-version: 3.8 
      - name: Install dependencies 
        run: pip install -r backend/requirements.txt 
      - name: Run lint 
        run: pylint backend 
      - name: Run tests 
        run: pytest backend 
  mobile: 
    runs_on: ubuntu-latest 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v2 
      - name: Set up Node.js 
        uses: actions/setup-node@v2 
        with: 
          node-version: 14 
      - name: Install dependencies 
        run: npm install 
      - name: Run lint 
        run: npm run lint 
      - name: Run tests 
        run: npm run test 
