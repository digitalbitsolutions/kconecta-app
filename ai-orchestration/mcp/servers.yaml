policy:
  php_runtime: docker_only
  disallow:
    - xampp
    - host_php
    - host_php_artisan_test
  mandatory_backend_test_command: "py ai-orchestration/orchestrator.py backend-test-docker"

servers:
  git:
    enabled: true
    description: "Read-only git introspection."
    actions:
      status: {}
      branch: {}
      log: {}

  filesystem:
    enabled: true
    description: "Read-only file access inside repository root."
    actions:
      read_text:
        max_chars: 6000

  ollama:
    enabled: true
    description: "Local Ollama runtime and model inspection."
    actions:
      health: {}
      list_models: {}

  docker:
    enabled: true
    description: "Docker-only runtime for backend checks (no XAMPP)."
    actions:
      list_containers: {}
      run_backend_tests: {}
